version: '3.8'

services:
  # Applicant Database MCP Server
  applicant-db:
    build: .
    container_name: applicant-db-server
    environment:
      - SERVICE_PORT=8001
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"
    command: python -m uvicorn mcp_servers.applicant_db:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Risk Rules Database MCP Server
  risk-rules-db:
    build: .
    container_name: risk-rules-db-server
    environment:
      - SERVICE_PORT=8002
      - PYTHONUNBUFFERED=1
    ports:
      - "8002:8002"
    command: python -m uvicorn mcp_servers.risk_rules_db:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Decision Synthesis MCP Server
  decision-synthesis:
    build: .
    container_name: decision-synthesis-server
    environment:
      - SERVICE_PORT=8003
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PYTHONUNBUFFERED=1
    ports:
      - "8003:8003"
    command: python -m uvicorn mcp_servers.decision_synthesis:app --host 0.0.0.0 --port 8003 --reload
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    depends_on:
      - applicant-db
      - risk-rules-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Notification System MCP Server
  notification-system:
    build: .
    container_name: notification-system-server
    environment:
      - SERVICE_PORT=8004
      - PYTHONUNBUFFERED=1
    ports:
      - "8004:8004"
    command: python -m uvicorn mcp_servers.notification_system:app --host 0.0.0.0 --port 8004 --reload
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    depends_on:
      - applicant-db
      - risk-rules-db
      - decision-synthesis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # FastAPI Microservice
  fastapi-service:
    build: .
    container_name: loan-approval-api
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - APPLICANT_DB_URL=http://applicant-db:8001
      - RISK_RULES_DB_URL=http://risk-rules-db:8002
      - DECISION_SYNTHESIS_URL=http://decision-synthesis:8003
      - NOTIFICATION_SYSTEM_URL=http://notification-system:8004
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    command: python -m uvicorn microservices.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    depends_on:
      - applicant-db
      - risk-rules-db
      - decision-synthesis
      - notification-system
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Streamlit UI
  streamlit-ui:
    build: .
    container_name: loan-approval-ui
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - FASTAPI_URL=http://fastapi-service:8000
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    command: streamlit run ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app
    networks:
      - loan-approval-network
    depends_on:
      - fastapi-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  loan-approval-network:
    driver: bridge

volumes:
  app-data:
    driver: local
